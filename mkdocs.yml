site_name: BEAK HEESUN Portfolio
site_url: https://e4m-hash.github.io

# Obsidian 첨부 폴더는 이미지 보관용 — .md 가 들어와도 페이지로 빌드되지 않도록 제외
# (이미지 등 비-마크다운 파일은 정상 복사되어 노트에서 참조됨)
exclude_docs: |
  **/attachments/*.md

# 내부 링크가 깨지면(404) 빌드 로그에 경고로 드러나도록 검증 활성화
validation:
  links:
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

# 사이드바 = 데이터 분석 스택 순서(수집→파이프라인→도메인→통계→AI→도구).
# 순서·섹션 제목·커스텀 라벨은 각 폴더의 .pages 파일에서 관리한다(awesome-pages 플러그인).
# 새 노트는 별도 설정 없이 자동으로 사이드바에 편입된다.

theme:
    name: 'material'
    language: ko
    features:
      - navigation.indexes   # 폴더의 index.md 를 그 섹션의 랜딩 페이지로
    palette:

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

# Obsidian 호환: 빌드 시 $$ 수식 블록·표 주위에 빈 줄을 보장해 블록 인식 오류 방지
hooks:
  - hooks/obsidian_compat.py

# Extensions
markdown_extensions:
  - tables          # GFM 표 렌더링 (없으면 | ... | 가 원문 텍스트로 깨짐)
  - footnotes
  # - attr_list
  - pymdownx.arithmatex:
      generic: true
  # - pymdownx.superfences
  # - pymdownx.details
  # - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages   # nav 자동 생성 + 폴더별 .pages 로 순서/제목 제어
  - roamlinks
  - blog
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid/dist/mermaid.min.js

